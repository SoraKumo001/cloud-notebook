# ──────────────────────────────────────────────────────────
# Dependabot — weekly npm dependency updates
# ──────────────────────────────────────────────────────────

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
